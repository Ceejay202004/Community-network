<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>CircleConnect • Community Network + Admin Dashboard</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #eef2ff;
            --secondary: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --radius-lg: 1rem;
            --radius-md: 0.75rem;
        }

        body.dark .navbar, body.dark .sidebar-card, body.dark .form-card, body.dark .post-card, body.dark .footer, body.dark .stats-row, body.dark .admin-dashboard {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }

        body.dark .btn-outline-light {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        body.dark .post-stats button, body.dark .stat-label, body.dark .author-info p, body.dark .event-info span, body.dark .group-info span {
            color: #94a3b8;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Navbar */
        .navbar {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255,255,255,0.98);
        }
        body.dark .navbar {
            background: #0f172a;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo i {
            color: var(--primary);
            margin-right: 6px;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: var(--gray-700);
        }
        body.dark .nav-links a {
            color: #cbd5e1;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
        }
        .btn-outline-light {
            border: 1px solid var(--gray-300);
            background: white;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .dark-mode-toggle-nav {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        /* Hero */
        .hero {
            padding: 3rem 0 2rem;
            background: linear-gradient(145deg, #ffffff 0%, #f9f5ff 100%);
        }
        body.dark .hero {
            background: #0f172a;
        }
        .hero-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: center;
        }
        .hero-content {
            flex: 1;
        }
        .hero-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .hero-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .hero-illustration {
            flex: 1;
            background: var(--primary-light);
            border-radius: 2rem;
            padding: 1.5rem;
            text-align: center;
        }
        .hero-illustration i {
            font-size: 6rem;
            color: var(--primary);
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            margin: 1.5rem 0;
            border: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }

        /* App Layout */
        .app-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .input-wrapper, .password-field {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            padding: 0.5rem;
        }
        .input-wrapper input, .password-field input {
            border: none;
            flex: 1;
            outline: none;
            background: transparent;
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 2rem;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .app-grid {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 1.5rem;
        }
        .sidebar-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 1rem;
        }
        .posts-grid, .members-grid, .events-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .post-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1rem;
            border: 1px solid var(--gray-200);
        }
        .post-author {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .post-stats button {
            background: none;
            border: none;
            cursor: pointer;
            margin-right: 1rem;
        }
        .like-btn.liked {
            color: #ef4444;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 0.5rem;
        }
        .tab-btn.active {
            background: var(--primary-light);
            color: var(--primary);
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            width: 100%;
            padding: 0.5rem;
            border-radius: 2rem;
            margin-top: 1rem;
            cursor: pointer;
        }
        .admin-dashboard {
            display: none;
            background: white;
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .admin-dashboard.visible {
            display: block;
        }
        .admin-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--gray-100);
            padding: 0.8rem;
            border-radius: 0.5rem;
            flex: 1;
            text-align: center;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 0.5rem;
            border-bottom: 1px solid var(--gray-200);
            text-align: left;
        }
        .action-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
        }
        .action-btn.danger {
            color: #ef4444;
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: none;
            z-index: 1000;
        }
        @media (max-width: 768px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
            .menu-toggle {
                display: block;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: white;
                padding: 1rem;
            }
            .nav-links.show {
                display: flex;
            }
            .hero-content h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo"><i class="fas fa-users"></i> CircleConnect</div>
        <button class="menu-toggle" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <button class="dark-mode-toggle-nav" id="darkModeToggle"><i class="fas fa-moon"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="#" id="navHome">Home</a>
            <a href="#" id="navFeedLink">Feed</a>
            <button class="btn-outline-light" id="adminToggleBtn"><i class="fas fa-lock"></i> Admin Panel</button>
            <button class="btn-outline-light" id="navSignInBtn">Sign in</button>
            <button class="btn-primary" id="navJoinBtn">Join now</button>
        </div>
    </div>
</nav>

<main>
    <div class="container">
        <!-- Admin Dashboard (hidden initially) -->
        <div id="adminDashboard" class="admin-dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-chalkboard-user"></i> Admin Control</h2>
                <button id="closeAdminBtn" class="btn-outline-light">Close</button>
            </div>
            <div class="admin-stats" id="adminStats"></div>
            <h3>Reported Content</h3>
            <table class="admin-table" id="reportedTable">
                <thead><tr><th>Content</th><th>Reported By</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
            <h3>Manage Users</h3>
            <table class="admin-table" id="usersTable">
                <thead><tr><th>Name</th><th>Role</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Registration Card -->
        <div id="registrationCard" class="form-card">
            <h1>Join CircleConnect</h1>
            <form id="registerForm">
                <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required></div>
                <div class="form-group"><label>Role</label><select id="userRole"><option value="member">Member</option><option value="admin">Admin</option></select></div>
                <button type="submit" class="btn-submit">Create Account</button>
                <p>Already have an account? <a href="#" id="showLoginBtn">Sign in</a></p>
            </form>
        </div>

        <!-- Login Card -->
        <div id="loginCard" class="form-card" style="display: none;">
            <h1>Welcome Back</h1>
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div>
                <button type="submit" class="btn-submit">Sign In</button>
                <p>No account? <a href="#" id="showRegisterBtn">Register</a></p>
            </form>
        </div>

        <!-- Main App (after login) -->
        <div id="mainAppCard" style="display: none;">
            <div class="app-grid">
                <div class="sidebar">
                    <div class="sidebar-card">
                        <div id="userProfileSummary"></div>
                        <button id="editProfileBtn" class="btn-outline-light" style="width:100%; margin:10px 0">Edit Profile</button>
                        <div class="search-wrapper"><input type="text" id="searchInput" placeholder="Search posts..."></div>
                        <button class="tab-btn active" id="tabPosts"><i class="fas fa-newspaper"></i> News Feed</button>
                        <button class="tab-btn" id="tabMembers"><i class="fas fa-users"></i> Members</button>
                        <button class="tab-btn" id="tabCreate"><i class="fas fa-pen"></i> Create Post</button>
                        <button class="tab-btn" id="tabEvents"><i class="fas fa-calendar"></i> Events</button>
                        <button class="logout-btn" id="logoutBtn">Logout</button>
                    </div>
                </div>
                <div class="main-content">
                    <div id="postsTab"><h2>News Feed</h2><div id="postsList" class="posts-grid"></div></div>
                    <div id="membersTab" style="display:none;"><h2>Members</h2><div id="membersList" class="members-grid"></div></div>
                    <div id="createTab" style="display:none;"><h2>Create Post</h2><textarea id="postContent" rows="3" style="width:100%"></textarea><button id="createPostBtn" class="btn-submit">Post</button></div>
                    <div id="eventsTab" style="display:none;"><h2>Events</h2><button id="createEventBtn" class="btn-primary">+ New Event</button><div id="eventsList" class="events-grid"></div></div>
                </div>
                <div class="right-sidebar">
                    <div class="sidebar-card"><h3>Community Stats</h3><div id="statsWidget"></div></div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="toast-message" id="toast"></div>

<script>
    // ----- Data Layer -----
    let users = JSON.parse(localStorage.getItem('community_users')) || [];
    let posts = JSON.parse(localStorage.getItem('community_posts')) || [];
    let events = JSON.parse(localStorage.getItem('community_events')) || [];
    let currentUser = null;

    function saveData() {
        localStorage.setItem('community_users', JSON.stringify(users));
        localStorage.setItem('community_posts', JSON.stringify(posts));
        localStorage.setItem('community_events', JSON.stringify(events));
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // ----- Auth -----
    document.getElementById('registerForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const role = document.getElementById('userRole').value;
        if (pwd !== confirm) return showToast('Passwords do not match');
        if (users.find(u => u.email === email)) return showToast('Email already exists');
        const newUser = { id: Date.now(), name, email, password: pwd, role, bio: '', avatar: '', createdAt: new Date() };
        users.push(newUser);
        saveData();
        showToast('Registration successful! Please sign in.');
        document.getElementById('registrationCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
    });

    document.getElementById('showLoginBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('registrationCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
    });
    document.getElementById('showRegisterBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('registrationCard').style.display = 'block';
    });

    document.getElementById('loginForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        const user = users.find(u => u.email === email && u.password === pwd);
        if (!user) return showToast('Invalid credentials');
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('registrationCard').style.display = 'none';
        document.getElementById('mainAppCard').style.display = 'block';
        renderApp();
    });

    function renderApp() {
        if (!currentUser) return;
        document.getElementById('userProfileSummary').innerHTML = `<strong>${currentUser.name}</strong><br>${currentUser.email}<br><span style="background:var(--primary); color:white; padding:2px 8px; border-radius:20px;">${currentUser.role}</span>`;
        renderPosts();
        renderMembers();
        renderEvents();
        updateStats();
        if (currentUser.role === 'admin') document.getElementById('adminToggleBtn').style.display = 'inline-block';
        else document.getElementById('adminToggleBtn').style.display = 'none';
    }

    function renderPosts() {
        const container = document.getElementById('postsList');
        if (!container) return;
        const filtered = posts.filter(p => p.status !== 'pending' || p.authorId === currentUser.id || currentUser.role === 'admin');
        container.innerHTML = filtered.map(post => `
            <div class="post-card">
                <div class="post-author"><div class="avatar">${post.authorName?.charAt(0) || 'U'}</div><div><b>${post.authorName}</b><br><small>${new Date(post.createdAt).toLocaleString()}</small></div></div>
                <p>${post.content}</p>
                ${post.image ? `<img src="${post.image}" style="max-width:100%; border-radius:0.5rem; margin:10px 0;">` : ''}
                <div class="post-stats">
                    <button class="like-btn" data-id="${post.id}"><i class="far fa-heart"></i> ${post.likes?.length || 0}</button>
                    <button class="delete-post-btn" data-id="${post.id}" style="color:red; ${currentUser.role !== 'admin' && post.authorId !== currentUser.id ? 'display:none' : ''}">Delete</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const post = posts.find(p => p.id === id);
                if (post) {
                    if (!post.likes) post.likes = [];
                    if (post.likes.includes(currentUser.id)) post.likes = post.likes.filter(uid => uid !== currentUser.id);
                    else post.likes.push(currentUser.id);
                    saveData();
                    renderPosts();
                }
            });
        });
        document.querySelectorAll('.delete-post-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('Delete post?')) {
                    posts = posts.filter(p => p.id !== parseInt(btn.dataset.id));
                    saveData();
                    renderPosts();
                }
            });
        });
    }

    function renderMembers() {
        const container = document.getElementById('membersList');
        if (!container) return;
        container.innerHTML = users.map(u => `
            <div class="post-card"><b>${u.name}</b> (${u.role})<br>${u.email}</div>
        `).join('');
    }

    function renderEvents() {
        const container = document.getElementById('eventsList');
        if (!container) return;
        container.innerHTML = events.map(e => `<div class="post-card"><b>${e.title}</b><br>${e.date}<br>${e.location}</div>`).join('');
    }

    function updateStats() {
        const statsDiv = document.getElementById('statsWidget');
        if (statsDiv) statsDiv.innerHTML = `<div>Members: ${users.length}</div><div>Posts: ${posts.length}</div><div>Events: ${events.length}</div>`;
    }

    document.getElementById('createPostBtn')?.addEventListener('click', () => {
        const content = document.getElementById('postContent').value;
        if (!content) return showToast('Write something');
        const newPost = {
            id: Date.now(),
            content,
            authorId: currentUser.id,
            authorName: currentUser.name,
            createdAt: new Date(),
            likes: [],
            status: currentUser.role === 'admin' ? 'approved' : 'approved',
            image: null
        };
        posts.unshift(newPost);
        saveData();
        document.getElementById('postContent').value = '';
        renderPosts();
        showToast('Post created!');
    });

    document.getElementById('createEventBtn')?.addEventListener('click', () => {
        const title = prompt('Event title');
        const date = prompt('Date & time');
        const location = prompt('Location');
        if (title && date) {
            events.push({ id: Date.now(), title, date, location, createdBy: currentUser.id });
            saveData();
            renderEvents();
        }
    });

    // Tab switching
    const tabs = { posts: document.getElementById('postsTab'), members: document.getElementById('membersTab'), create: document.getElementById('createTab'), events: document.getElementById('eventsTab') };
    function showTab(tab) {
        Object.values(tabs).forEach(t => t.style.display = 'none');
        tabs[tab].style.display = 'block';
        if (tab === 'posts') renderPosts();
        if (tab === 'members') renderMembers();
        if (tab === 'events') renderEvents();
    }
    document.getElementById('tabPosts')?.addEventListener('click', () => showTab('posts'));
    document.getElementById('tabMembers')?.addEventListener('click', () => showTab('members'));
    document.getElementById('tabCreate')?.addEventListener('click', () => showTab('create'));
    document.getElementById('tabEvents')?.addEventListener('click', () => showTab('events'));

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        currentUser = null;
        localStorage.removeItem('currentUser');
        document.getElementById('mainAppCard').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
    });

    // Admin Dashboard
    const adminDash = document.getElementById('adminDashboard');
    document.getElementById('adminToggleBtn')?.addEventListener('click', () => {
        if (currentUser?.role !== 'admin') return showToast('Admin access only');
        adminDash.classList.toggle('visible');
        if (adminDash.classList.contains('visible')) {
            document.getElementById('adminStats').innerHTML = `<div class="stat-card">Users: ${users.length}</div><div class="stat-card">Posts: ${posts.length}</div><div class="stat-card">Reports: 0</div>`;
            const usersTable = document.getElementById('usersTable').querySelector('tbody');
            usersTable.innerHTML = users.map(u => `<tr><td>${u.name}</td><td>${u.role}</td><td><button class="action-btn danger" data-uid="${u.id}">Delete User</button></td></tr>`).join('');
            document.querySelectorAll('[data-uid]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (confirm('Delete user?')) {
                        users = users.filter(u => u.id !== parseInt(btn.dataset.uid));
                        posts = posts.filter(p => p.authorId !== parseInt(btn.dataset.uid));
                        saveData();
                        showToast('User deleted');
                        location.reload();
                    }
                });
            });
        }
    });
    document.getElementById('closeAdminBtn')?.addEventListener('click', () => adminDash.classList.remove('visible'));

    // Dark Mode
    document.getElementById('darkModeToggle')?.addEventListener('click', () => document.body.classList.toggle('dark'));

    // Mobile menu
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => document.getElementById('navLinks').classList.toggle('show'));

    // Initial load
    const storedUser = localStorage.getItem('currentUser');
    if (storedUser) {
        currentUser = JSON.parse(storedUser);
        const found = users.find(u => u.id === currentUser.id);
        if (found) {
            currentUser = found;
            document.getElementById('mainAppCard').style.display = 'block';
            document.getElementById('registrationCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'none';
            renderApp();
        } else {
            localStorage.removeItem('currentUser');
            document.getElementById('registrationCard').style.display = 'block';
        }
    } else {
        document.getElementById('registrationCard').style.display = 'block';
    }
</script>
</body>
</html>
